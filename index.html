<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom E-Commerse</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/hero.css">
    <script src="https://kit.fontawesome.com/67e2ff5a16.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style/header.css">
    <link rel="stylesheet" href="style/product.css">

</head>

<body>
    <header>
        <nav>
            <div class="first-section">
                <p>BLOOM<span>SHOP</span></p>
                <p>Contact</p>
            </div>

            <div class="second-section ">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Search products..." class="search-input">
            </div>

            <div class="third-section">
                <div class="search-btn">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                </div>
                <div class="bar-Btn">
                    <i class="fa-solid fa-bars bar-icon"></i>
                </div>

                <div class="cart">
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                    <div class="add-quantity">0</div>
                </div>
                <div class="Btns">
                    <button>Sign In</button>
                    <button>Sign Up </button>
                </div>
            </div>
        </nav>
    </header>

    <div class="hero-section">
        <img src="images/hero-images.jpg" class="hero-img">
        <h3 class="hero-heading">Step Into Style</h3>
        <p class="hero-para">Step into comfort with premium sneakers crafted for every move.</p>
        <div class="btns">
            <button class="backword-btn"><</button>
            <button class="forward-btn">></button>
        </div>
    </div>

    <div class="product-section">
    
    </div>



    <script src="Script/product.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.15.0/gsap.min.js" integrity="sha512-Qrpii3NEFZ02RN6ZqpTu6pS/5PEq7EzBYJLki3AKBd8IncrlAwQdZHzExYwS0+b1NM0/qfxI1GOhqWLVosocDA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="Script/script.js"></script>
</body>

</html>
